name: Full CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::753675398606:role/GitHubActions-OIDC-CloudNativeSRE
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform validate
      - run: terraform apply -auto-approve


  deploy:
    runs-on: ubuntu-latest
    needs: terraform

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::753675398606:role/GitHubActions-OIDC-CloudNativeSRE
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Build Docker image
        run: docker build -t cloud-native-sre-platform:${IMAGE_TAG} .

      - name: Tag Docker image
        run: docker tag cloud-native-sre-platform:${IMAGE_TAG} ${{ steps.login-ecr.outputs.registry }}/cloud-native-sre-platform:${IMAGE_TAG}

      - name: Push Docker image
        run: docker push ${{ steps.login-ecr.outputs.registry }}/cloud-native-sre-platform:${IMAGE_TAG}