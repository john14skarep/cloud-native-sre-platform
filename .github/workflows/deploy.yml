name: Full CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./terraform

    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::753675398606:role/GitHubActions-OIDC-CloudNativeSRE
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform validate
      - run: terraform apply -auto-approve

      - name: Capture Terraform output
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT


  deploy:
    runs-on: ubuntu-latest
    needs: terraform

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::753675398606:role/GitHubActions-OIDC-CloudNativeSRE
          aws-region: us-east-1

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ${{ needs.terraform.outputs.ecr_url }}:${IMAGE_TAG} .

      - name: Push Docker image
        run: docker push ${{ needs.terraform.outputs.ecr_url }}:${IMAGE_TAG}